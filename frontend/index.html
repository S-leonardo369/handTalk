<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="data:," />
  <title>ASL Translate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div class="start-screen" id="startScreen">
    <div class="start-inner">
      <div class="start-logo">✋ <strong>ASL</strong>translate</div>
      <p class="start-hint">Position your hand in frame and start signing</p>
      <button class="start-btn" id="btnStart">
        <span class="btn-label">Start Camera</span>
      </button>
      <div class="start-status">
        <span class="sdot" id="statusDot"></span>
        <span id="statusText">Checking backend…</span>
      </div>
    </div>
  </div>

<div class="top-bar" id="topBar">
  <div class="top-logo">✋ <strong>ASL</strong><span>translate</span></div>
  
  <!-- Styled Navigation -->
  <div class="nav-links">
    <a href="index.html" class="nav-link active">Translate</a>
    <a href="sign.html"  class="nav-link">Sign</a>
    <a href="learn.html" class="nav-link">Learn</a>
  </div>

  <div class="top-right">
    <span class="sdot" id="topDot"></span>
    <span id="topStatus">—</span>
    <button class="icon-btn" id="btnSettings" title="Settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</div>

  <div class="hand-ring" id="handRing"></div>

  <div class="sign-display" id="signDisplay">
    <div class="sign-word" id="signWord"></div>
  </div>

  <div class="sentence-bar" id="sentenceBar">
    <div class="sentence-text placeholder" id="sentenceText">Completed sentences appear here</div>
    <div class="sentence-chips" id="sentenceChips"></div>
  </div>

  <div class="controls hidden" id="controls">
    <button class="ctrl-btn" id="btnFlush" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
      Flush
    </button>
    <button class="ctrl-btn" id="btnSpeak" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      Speak
    </button>
    <button class="ctrl-btn ctrl-btn--clear" id="btnClear">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Clear
    </button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-inner">
      <div class="settings-title">Settings</div>
      <div class="setting-row">
        <span class="setting-label">Confidence</span>
        <input type="range" id="confThresh" min="10" max="90" value="50" />
        <span class="setting-val" id="confThreshVal">50%</span>
      </div>
      <div class="setting-row">
        <span class="setting-label">Pause flush</span>
        <input type="range" id="pauseThresh" min="8" max="40" value="15" />
        <span class="setting-val" id="pauseThreshVal">1.5s</span>
      </div>
      <div class="setting-row setting-row--url">
        <span class="setting-label">Backend</span>
        <input class="url-input" id="backendUrl" type="text" value="http://localhost:8000"
          autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
      </div>
      <div class="model-info" id="modelInfo">Checking…</div>
      <button class="settings-close" id="btnSettingsClose">Done</button>
    </div>
  </div>

  <div class="history-panel" id="historyPanel">
    <div class="history-inner">
      <div class="history-title">
        <span>Translation history</span>
        <button class="icon-btn" id="btnHistoryClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No translations yet</div>
      </div>
    </div>
  </div>

  <canvas id="celebrationCanvas" style="position:fixed;inset:0;pointer-events:none;z-index:200;display:none;"></canvas>
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
